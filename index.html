<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terri</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #000;
      color: #fff;
      cursor: none;
    }

    #cursor {
      position: fixed;
      width: 14px;
      height: 14px;
      border: 1px solid #fff;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
    }

    .home-card:hover {
      box-shadow: 0 0 24px rgba(255,255,255,0.08);
      transform: translateY(-3px);
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle at 28% 72%, rgba(255,255,255,0.75) 0 1px, transparent 1.5px),
        radial-gradient(circle at 44% 26%, rgba(255,255,255,0.85) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 61% 82%, rgba(255,255,255,0.7) 0 1px, transparent 1.5px),
        radial-gradient(circle at 77% 34%, rgba(255,255,255,0.95) 0 1.1px, transparent 1.7px),
        radial-gradient(circle at 88% 58%, rgba(255,255,255,0.8) 0 1px, transparent 1.5px),
        #000;
      background-size: 420px 420px;
      animation: drift 40s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: -220px 120px; }
    }
  </style>
</head>
<body class="min-h-screen">

  <div class="stars"></div>
  <div id="cursor"></div>

  <div class="relative z-10 max-w-7xl mx-auto px-6 py-8">

    <header class="border-b border-white/10 pb-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
        <div>
          <h1 class="text-5xl font-black tracking-tight">Terri</h1>
          <p class="text-white/50 mt-2">Black and white browser games.</p>
        </div>

        <input
          id="search"
          type="text"
          placeholder="Search"
          class="w-full md:w-72 bg-black border border-white/15 px-4 py-3 outline-none"
        />
      </div>

      <nav class="flex gap-3 mt-6">
        <button data-tab="home" class="tab-btn border border-white px-4 py-2 text-sm">Home</button>
        <button data-tab="games" class="tab-btn border border-white/15 px-4 py-2 text-sm">Games</button>
        <button data-tab="apps" class="tab-btn border border-white/15 px-4 py-2 text-sm">Apps</button>
        <button data-tab="movies" class="tab-btn border border-white/15 px-4 py-2 text-sm">Movies</button>
        <button data-tab="partners" class="tab-btn border border-white/15 px-4 py-2 text-sm">Partners</button>
      </nav>
    </header>

    <section id="home-tab" class="mt-16 min-h-[68vh]">
      <div class="min-h-[68vh] flex items-center justify-center">
        <div class="w-full max-w-4xl text-center">
          <div class="text-6xl md:text-7xl font-black tracking-tight mb-4">Terri</div>
          <p class="text-white/50 max-w-xl mx-auto mb-10">
            Games, apps, movies, and partnerships — all inside Terri.
          </p>

          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 max-w-3xl mx-auto">

            <div data-home-tab="games" class="home-card group border border-white/12 bg-white/[0.03] hover:bg-white/[0.06] transition duration-300 p-5 cursor-pointer text-center">
              <div class="text-2xl mb-2">🎮</div>
              <div class="text-lg font-semibold">Games</div>
            </div>

            <div data-home-tab="apps" class="home-card group border border-white/12 bg-white/[0.03] hover:bg-white/[0.06] transition duration-300 p-5 cursor-pointer text-center">
              <div class="text-2xl mb-2">📱</div>
              <div class="text-lg font-semibold">Apps</div>
            </div>

            <div data-home-tab="movies" class="home-card group border border-white/12 bg-white/[0.03] hover:bg-white/[0.06] transition duration-300 p-5 cursor-pointer text-center">
              <div class="text-2xl mb-2">🎬</div>
              <div class="text-lg font-semibold">Movies</div>
            </div>

            <div data-home-tab="partners" class="home-card group border border-white/12 bg-white/[0.03] hover:bg-white/[0.06] transition duration-300 p-5 cursor-pointer text-center">
              <div class="text-2xl mb-2">✦</div>
              <div class="text-lg font-semibold">Partners</div>
            </div>

          </div>
        </div>
      </div>
    </section>

    <section id="apps-tab" class="hidden mt-10 border border-white/10 bg-white/[0.02] p-8 text-center">
      <div class="text-sm uppercase tracking-[0.3em] text-white/45">Apps</div>
      <h2 class="text-3xl font-bold mt-3">Apps</h2>

      <a
        href="https://unblockedai.app"
        target="_blank"
        class="inline-block mt-6 border border-white/12 bg-white/[0.03] hover:bg-white/[0.06] px-8 py-6"
      >
        Unblocked AI
      </a>
    </section>

    <section id="movies-tab" class="hidden mt-10 border border-white/10 bg-white/[0.02] p-8 text-center">
      <div class="text-sm uppercase tracking-[0.3em] text-white/45">Movies</div>
      <h2 class="text-3xl font-bold mt-3">Movies coming soon</h2>
    </section>

    <section id="partners-tab" class="hidden mt-10 border border-white/10 bg-white/[0.02] p-8 text-center">
      <div class="text-sm uppercase tracking-[0.3em] text-white/45">Partners</div>
      <h2 class="text-3xl font-bold mt-3">Partner with Terri</h2>
      <p class="text-white/55 mt-3">TikTok: @terri.unbloxked</p>
    </section>

    <div id="games-tab" class="hidden">

      <nav id="filters" class="flex gap-2 flex-wrap mt-8"></nav>

      <section id="player" class="hidden mt-8 border border-white/10 bg-white/[0.02]">
        <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
          <div id="player-title" class="font-medium"></div>

          <div class="flex gap-2">
            <button id="refresh-btn" class="border border-white/15 px-3 py-2 text-sm">Refresh</button>
            <button id="fullscreen-btn" class="border border-white/15 px-3 py-2 text-sm">Fullscreen</button>
            <button id="close-btn" class="border border-white/15 px-3 py-2 text-sm">Close</button>
          </div>
        </div>

        <iframe
          id="game-frame"
          class="w-full aspect-video bg-black"
          allowfullscreen
        ></iframe>
      </section>

      <section id="games" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-8"></section>
    </div>

  </div>

  <script>
    const games = [
      {
        name: 'Basketball Bros',
        category: 'Sports',
        url: 'https://basketbros.io',
        thumbnail: 'https://freegames.io/files/images/basketbros_512x384_512_384.png'
      },
      {
        name: 'Baseball Bros',
        category: 'Sports',
        url: 'https://baseballbros.io',
        thumbnail: 'https://baseballbros.io/sbros_364x180.png'
      }
    ];

    const gamesEl = document.getElementById('games');
    const filtersEl = document.getElementById('filters');
    const searchEl = document.getElementById('search');
    const frame = document.getElementById('game-frame');
    const player = document.getElementById('player');
    const playerTitle = document.getElementById('player-title');

    const tabs = {
      home: document.getElementById('home-tab'),
      games: document.getElementById('games-tab'),
      apps: document.getElementById('apps-tab'),
      movies: document.getElementById('movies-tab'),
      partners: document.getElementById('partners-tab')
    };

    let activeCategory = 'All';
    const categories = ['All', ...new Set(games.map(g => g.category))];
    let currentGame = null;

    function showTab(tab) {
      Object.entries(tabs).forEach(([name, el]) => {
        el.classList.toggle('hidden', name !== tab);
      });
    }

    function openGame(game) {
      currentGame = game;
      frame.src = game.url;
      playerTitle.textContent = game.name;
      player.classList.remove('hidden');
      showTab('games');
      player.scrollIntoView({ behavior: 'smooth' });
    }

    function renderFilters() {
      filtersEl.innerHTML = '';

      categories.forEach(category => {
        const button = document.createElement('button');
        button.textContent = category;
        button.className =
          `px-4 py-2 border text-sm ${activeCategory === category ? 'border-white' : 'border-white/10'}`;

        button.onclick = () => {
          activeCategory = category;
          renderFilters();
          renderGames();
        };

        filtersEl.appendChild(button);
      });
    }

    function renderGames() {
      const q = searchEl.value.toLowerCase();

      const filtered = games.filter(game => {
        const categoryOk = activeCategory === 'All' || game.category === activeCategory;
        const searchOk = game.name.toLowerCase().includes(q);
        return categoryOk && searchOk;
      });

      gamesEl.innerHTML = '';

      filtered.forEach(game => {
        const card = document.createElement('button');

        card.className =
          'text-left border border-white/10 bg-white/[0.02] hover:bg-white/[0.05] p-5 transition';

        card.innerHTML = `
          <div class="aspect-video border border-white/10 bg-black mb-4 overflow-hidden">
            <img src="${game.thumbnail}" class="w-full h-full object-cover" />
          </div>

          <div class="text-lg font-semibold">${game.name}</div>
          <div class="text-white/45 text-sm mt-1">${game.category}</div>
        `;

        card.onclick = () => openGame(game);

        gamesEl.appendChild(card);
      });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => showTab(btn.dataset.tab);
    });

    document.querySelectorAll('.home-card').forEach(card => {
      card.onclick = () => showTab(card.dataset.homeTab);
    });

    document.getElementById('close-btn').onclick = () => {
      frame.src = '';
      player.classList.add('hidden');
    };

    document.getElementById('refresh-btn').onclick = () => {
      if (!currentGame) return;

      frame.src = '';
      setTimeout(() => {
        frame.src = currentGame.url;
      }, 100);
    };

    document.getElementById('fullscreen-btn').onclick = async () => {
      try {
        if (frame.requestFullscreen) {
          await frame.requestFullscreen();
        } else if (player.requestFullscreen) {
          await player.requestFullscreen();
        }
      } catch (e) {
        console.warn(e);
      }
    };

    searchEl.addEventListener('input', renderGames);

    renderFilters();
    renderGames();
    showTab('home');

    const cursor = document.getElementById('cursor');

    window.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
